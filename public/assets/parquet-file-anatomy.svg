<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="metaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="indexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>
  <rect width="820" height="420" fill="#fafafa"/>
  <text x="410" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Parquet file layout (read direction: footer first)</text>

  <rect x="40" y="60" width="740" height="170" rx="10" fill="url(#dataGrad)" stroke="#2563eb" stroke-width="2"/>
  <text x="60" y="88" font-size="16" font-weight="700" fill="#1e3a8a">Data pages (column chunks inside row groups)</text>

  <rect x="70" y="105" width="200" height="95" rx="8" fill="#fff" stroke="#60a5fa"/>
  <text x="170" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Row Group 0</text>
  <rect x="85" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="145" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="205" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="110" y="170" text-anchor="middle" font-size="11" fill="#475569">Pg</text>
  <text x="170" y="170" text-anchor="middle" font-size="11" fill="#475569">Pg</text>
  <text x="230" y="170" text-anchor="middle" font-size="11" fill="#475569">Pg</text>

  <rect x="290" y="105" width="200" height="95" rx="8" fill="#fff" stroke="#60a5fa"/>
  <text x="390" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Row Group 1</text>
  <rect x="305" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="365" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="425" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>

  <rect x="510" y="105" width="200" height="95" rx="8" fill="#fff" stroke="#60a5fa"/>
  <text x="610" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Row Group N</text>
  <rect x="525" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="585" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="645" y="145" width="50" height="40" rx="4" fill="#eff6ff" stroke="#93c5fd"/>

  <rect x="40" y="250" width="740" height="130" rx="10" fill="url(#metaGrad)" stroke="#d97706" stroke-width="2"/>
  <text x="60" y="278" font-size="16" font-weight="700" fill="#92400e">Footer metadata (tail read)</text>

  <rect x="70" y="295" width="150" height="60" rx="8" fill="#fff" stroke="#f59e0b"/>
  <text x="145" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">File metadata</text>
  <text x="145" y="340" text-anchor="middle" font-size="11" fill="#78716c">schema, row groups</text>

  <rect x="240" y="295" width="170" height="60" rx="8" fill="url(#indexGrad)" stroke="#16a34a"/>
  <text x="325" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">ColumnIndex</text>
  <text x="325" y="338" text-anchor="middle" font-size="11" fill="#166534">min/max per page</text>

  <rect x="430" y="295" width="170" height="60" rx="8" fill="url(#indexGrad)" stroke="#16a34a"/>
  <text x="515" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">OffsetIndex</text>
  <text x="515" y="338" text-anchor="middle" font-size="11" fill="#166534">page byte offsets</text>

  <rect x="620" y="295" width="130" height="60" rx="8" fill="#fff" stroke="#f59e0b"/>
  <text x="685" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Bloom filters</text>
  <text x="685" y="340" text-anchor="middle" font-size="11" fill="#78716c">optional</text>

  <path d="M410 230 L410 245" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="242" font-size="12" fill="#64748b">planner reads footer before data pages</text>
</svg>
